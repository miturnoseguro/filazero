<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#00C48C; --green-lt:#E8FBF5; --green-dk:#009E72;
  --yellow:#F59E0B; --yellow-lt:#FFFBEB;
  --orange:#F97316; --orange-lt:#FFF7ED;
  --red:#EF4444; --red-lt:#FEF2F2;
  --blue:#6366F1; --blue-lt:#EEF2FF;
  --purple:#A855F7; --purple-lt:#F5F3FF;
  --gold:#F59E0B;
  --bg:#F0F4F8; --surface:#FFFFFF; --surface2:#F1F5F9;
  --border:#E2E8F0; --border2:#CBD5E1;
  --text:#0F172A; --text2:#64748B; --text3:#94A3B8;
  --radius:10px; --radius-lg:16px; --radius-xl:22px;
  --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 12px 40px rgba(15,23,42,.12),0 4px 12px rgba(15,23,42,.06);
  --shadow-float:0 8px 32px rgba(15,23,42,.18),0 2px 8px rgba(15,23,42,.10);
  --font-base:15px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
html,body{height:100%;overflow:hidden;background:#fff;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:var(--font-base);line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:1200px;margin:0 auto;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:14px;padding: max(var(--sat), 10px) 18px 10px;height: calc(60px + var(--sat));background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.7);flex-shrink:0;position:relative;z-index:1500;flex-wrap:nowrap;}
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-decoration:none;cursor:pointer;flex-shrink:0;}
.brand-mark{width:150px;height:43px;border-radius:11px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand-powered{font-size:9px;font-weight:500;color:var(--text3);letter-spacing:.15px;padding-left:2px;white-space:nowrap;line-height:1;position:relative;top:-10px;left:27px;}
.brand-powered strong{font-weight:700;color:var(--text3);}
.topbar-auth{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:9px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 14px 4px 4px;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-sm);}
.user-chip:hover{border-color:var(--green);background:var(--green-lt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,196,140,.18);}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00C48C,#00A87A);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 2px 6px rgba(0,196,140,.3);overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-chip-info{min-width:74px;}
.pts-row{display:flex;align-items:center;gap:5px;}
.lvl-badge{font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#A855F7,#6366F1);padding:1px 7px;border-radius:6px;letter-spacing:.2px;box-shadow:0 0 8px rgba(168,85,247,.45);}
.pts-label{font-size:13px;font-weight:800;color:var(--green);line-height:1.2;}
.xp-bar-bg{height:4px;background:var(--surface2);border-radius:99px;margin-top:3px;overflow:hidden;border:1px solid var(--border);}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00C48C,#22D3EE);box-shadow:0 0 6px rgba(34,211,238,.6);transition:width .6s cubic-bezier(.34,1.1,.64,1);}
.user-chip-wrap{position:relative;}
.chip-caret{width:12px;height:12px;color:var(--text3);flex-shrink:0;transition:transform .2s;}
.user-chip-wrap.open .chip-caret{transform:rotate(180deg);}
.user-dropdown{top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:6px;box-shadow:var(--shadow-lg);min-width:170px;display:none;z-index:10050;position:fixed;animation:dropIn .18s cubic-bezier(.34,1.56,.64,1);}

.user-dropdown.open{display:block;}
.user-dropdown-item{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:10px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}

.login-topbar-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00C48C,#009E72);color:#fff;border:none;border-radius:99px;padding:8px 17px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(0,196,140,.3);transition:all .2s;font-family:inherit;}
.login-topbar-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,196,140,.4);}
@keyframes spin{to{transform:rotate(360deg)}}
.gbtn-spinner{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;animation:spin .7s linear infinite;display:none;flex-shrink:0;}
.login-topbar-btn.is-loading .gbtn-spinner{display:inline-block;}

.panel.visible{display:flex;flex-direction:column;animation:panelIn .28s cubic-bezier(.34,1.2,.64,1);}

</style>

<body>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURACIÓN FOURSQUARE — AGREGA TUS KEYS AQUÍ ⬇️
   ═══════════════════════════════════════════════════════════════ */

const FOURSQUARE_CONFIG = {
  // 🔑 VE A https://developer.foursquare.com/ Y OBTÉN TU API KEY
  // Luego pega aquí: sk_live_xxxxxxxxxxxxxxxx
  API_KEY: 'sk_live_AQUI_TU_API_KEY', // ← CAMBIAR
  
  API_BASE: 'https://api.foursquare.com/v3',
  SEARCH_RADIUS: 800, // metros
  LIMIT: 50,
};

// Cache para búsquedas (30 minutos)
const FOURSQUARE_CACHE = new Map();
const CACHE_EXPIRY = 30 * 60 * 1000;

/* ─── FOURSQUARE: Buscar lugares ─── */
async function foursquareSearch(lat, lng, categoryFilter = 'all') {
  const cacheKey = `${lat}_${lng}_${categoryFilter}`;
  
  // Revisar caché
  if (FOURSQUARE_CACHE.has(cacheKey)) {
    const cached = FOURSQUARE_CACHE.get(cacheKey);
    if (Date.now() - cached.time < CACHE_EXPIRY) {
      console.log('✅ Usando caché Foursquare');
      return cached.data;
    }
  }

  if (FOURSQUARE_CONFIG.API_KEY.includes('AQUI_TU')) {
    showToast('⚠️ Configura tu API Key de Foursquare en el código');
    return [];
  }

  try {
    const params = new URLSearchParams({
      'll': `${lat},${lng}`,
      'radius': FOURSQUARE_CONFIG.SEARCH_RADIUS,
      'limit': FOURSQUARE_CONFIG.LIMIT,
      'sort': 'distance',
    });

    const response = await fetch(
      `${FOURSQUARE_CONFIG.API_BASE}/places/search?${params}`,
      {
        headers: {
          'Authorization': FOURSQUARE_CONFIG.API_KEY,
          'Accept': 'application/json',
        },
      }
    );

    if (!response.ok) {
      console.error('❌ Error Foursquare:', response.status);
      return [];
    }

    const data = await response.json();
    const places = (data.results || []).map(place => ({
      id: place.fsq_id,
      name: place.name,
      category: place.categories?.[0]?.name || 'Comercio',
      lat: place.location.lat,
      lng: place.location.lon,
      distance: place.location.distance || null,
      address: place.location.formatted_address || 'Sin dirección',
      rating: place.rating || null,
      phone: place.tel || null,
      website: place.website || null,
      image: place.photos?.[0]?.prefix + place.photos?.[0]?.suffix || null,
    }));

    // Guardar en caché
    FOURSQUARE_CACHE.set(cacheKey, { data: places, time: Date.now() });
    
    return places;
  } catch (error) {
    console.error('❌ Error buscando lugares:', error);
    return [];
  }
}

/* ─── FOURSQUARE: Autocomplete ─── */
async function foursquareAutocomplete(query, lat, lng) {
  if (!query || query.length < 2) return [];
  
  if (FOURSQUARE_CONFIG.API_KEY.includes('AQUI_TU')) return [];

  try {
    const params = new URLSearchParams({
      'query': query,
      'll': `${lat},${lng}`,
      'limit': 8,
    });

    const response = await fetch(
      `${FOURSQUARE_CONFIG.API_BASE}/places/autocomplete?${params}`,
      {
        headers: {
          'Authorization': FOURSQUARE_CONFIG.API_KEY,
        },
      }
    );

    if (!response.ok) return [];
    const data = await response.json();
    
    return (data.results || []).map(r => ({
      id: r.place_id,
      name: r.text.primary,
      address: r.text.secondary || '',
    }));
  } catch (error) {
    console.error('❌ Error autocomplete:', error);
    return [];
  }
}

/* ─── CARGAR LUGARES EN MÓDULO CERCA ─── */
let currentCercaPlaces = [];
let cercaLoaded = false;

async function cercaLoadPlaces() {
  try {
    showLoadingState('🔍 Cargando lugares cercanos...');
    
    const userLoc = await getUserLocation();
    const places = await foursquareSearch(userLoc.lat, userLoc.lng);
    
    if (!places || places.length === 0) {
      showEmptyState();
      return;
    }

    currentCercaPlaces = places;
    cercaLoaded = true;
    renderCercaPlaces(places);
    
  } catch (error) {
    console.error('Error loading places:', error);
    showErrorState('No pudimos cargar los lugares');
  }
}

function renderCercaPlaces(places) {
  const container = document.getElementById('cerca-places-list');
  
  if (!places || places.length === 0) {
    showEmptyState();
    return;
  }

  container.innerHTML = places.map(place => `
    <div class="cerca-place-card" onclick="handlePlaceClick('${place.id}', ${place.lat}, ${place.lng})">
      <div class="place-header">
        <div class="place-name">${place.name}</div>
        <div class="place-distance">${place.distance ? (place.distance / 1000).toFixed(1) + ' km' : 'N/A'}</div>
      </div>
      <div class="place-category">${place.category}</div>
      <div class="place-meta">
        ${place.rating ? `<span class="place-rating">⭐ ${place.rating.toFixed(1)}</span>` : ''}
        <span class="place-last-update">Actualizado hace poco</span>
      </div>
      <div class="crowd-indicator">
        <div class="crowd-bar">
          <div class="crowd-fill crowd-${getRandomCrowdLevel()}"></div>
        </div>
        <div class="crowd-label">${getCrowdLabel()}</div>
      </div>
      ${place.phone ? `
        <div class="place-action">
          <a href="tel:${place.phone}" class="btn-small">📞 Llamar</a>
        </div>
      ` : ''}
    </div>
  `).join('');
}

function handlePlaceClick(placeId, lat, lng) {
  // Navegar al mapa y centrar en ese lugar
  if (leafletMap) {
    leafletMap.setView([lat, lng], 16);
    switchTab('map');
  }
}

function getRandomCrowdLevel() {
  const levels = ['empty', 'low', 'medium', 'high', 'very_high'];
  return levels[Math.floor(Math.random() * levels.length)];
}

function getCrowdLabel() {
  const labels = ['🟢 Vacío', '🟢 Poco concurrido', '🟡 Normal', '🔴 Muy concurrido', '🔴🔴 Abarrotado'];
  return labels[Math.floor(Math.random() * labels.length)];
}

function filterCercaCategory(category) {
  if (category === 'all') {
    renderCercaPlaces(currentCercaPlaces);
  } else {
    // Filtrar por categoría (simplificado)
    const filtered = currentCercaPlaces.filter(p => {
      const cat = p.category.toLowerCase();
      return cat.includes(category);
    });
    renderCercaPlaces(filtered);
  }
}

function showLoadingState(msg) {
  document.getElementById('cerca-places-list').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div>${msg}</div>
    </div>
  `;
}

function showEmptyState() {
  document.getElementById('cerca-places-list').innerHTML = `
    <div class="empty-state">
      <div style="font-size:48px">📍</div>
      <div style="font-weight:700;color:var(--text)">Sin resultados</div>
      <div style="font-size:13px;color:var(--text2)">No encontramos lugares en tu zona</div>
    </div>
  `;
}

function showErrorState(msg) {
  document.getElementById('cerca-places-list').innerHTML = `
    <div class="error-state">
      <div style="font-size:48px">⚠️</div>
      <div>${msg}</div>
      <button class="btn-small" onclick="cercaLoadPlaces()">Reintentar</button>
    </div>
  `;
}

/* ─── OBTENER UBICACIÓN DEL USUARIO ─── */
function getUserLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      (err) => reject(err),
      { timeout: 5000 }
    );
  });
}

/* ─── MAPA LEAFLET ─── */
let leafletMap;
let userMarker;

async function initMap() {
  try {
    const userLoc = await getUserLocation();
    
    leafletMap = L.map('leaflet-map').setView([userLoc.lat, userLoc.lng], 14);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap',
    }).addTo(leafletMap);

    // Marcador del usuario
    userMarker = L.circleMarker([userLoc.lat, userLoc.lng], {
      radius: 8,
      fillColor: '#00C48C',
      color: '#009E72',
      weight: 3,
      opacity: 1,
      fillOpacity: 0.8,
    }).addTo(leafletMap);

    // Cargar lugares en el mapa
    await loadMapPlaces(userLoc.lat, userLoc.lng);
    
  } catch (error) {
    console.error('Error initializing map:', error);
    showToast('❌ No pudimos obtener tu ubicación');
  }
}

async function loadMapPlaces(lat, lng) {
  const places = await foursquareSearch(lat, lng);
  
  places.forEach(place => {
    const icon = getCategoryIcon(place.category);
    
    L.marker([place.lat, place.lng], {
      title: place.name,
    }).bindPopup(`
      <div style="min-width:200px">
        <div style="font-weight:700;margin-bottom:4px">${place.name}</div>
        <div style="font-size:12px;color:#666;margin-bottom:6px">${place.category}</div>
        ${place.rating ? `<div style="font-size:12px">⭐ ${place.rating.toFixed(1)}/10</div>` : ''}
        ${place.distance ? `<div style="font-size:12px;margin-top:6px">📍 ${(place.distance/1000).toFixed(1)} km</div>` : ''}
        ${place.phone ? `<div style="margin-top:8px"><a href="tel:${place.phone}" style="color:#00C48C;text-decoration:none;font-weight:600">📞 Llamar</a></div>` : ''}
      </div>
    `).addTo(leafletMap);
  });
}

function getCategoryIcon(category) {
  const icons = {
    'retail': '🏪',
    'food': '🍔',
    'pharmacy': '💊',
    'bank': '🏦',
  };
  return icons[category] || '📍';
}

/* ─── UI BÁSICO ─── */
function switchTab(tab) {
  ['map', 'cerca', 'ranking', 'prizes'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('visible', t === tab);
  });
  
  document.querySelectorAll('.tab').forEach((btn, idx) => {
    const tabs = ['map', 'cerca', 'ranking', 'prizes'];
    btn.classList.toggle('active', tabs[idx] === tab);
  });

  if (tab === 'map' && leafletMap) {
    setTimeout(() => leafletMap.invalidateSize(), 50);
  }
  
  if (tab === 'cerca' && !cercaLoaded) {
    cercaLoadPlaces();
  }
}

  const toast = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;

let rankingData = [];
let prizesData = [];

function buildRanking() {
  const sorted = [...rankingData].sort((a, b) => b.pts - a.pts);
  const listEl = document.getElementById('rank-list');
  
  if (!sorted.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div style="font-size:34px">🏆</div>
        <div style="font-weight:700">Todavía no hay reportes</div>
        <div style="font-size:12px;color:var(--text2)">Sé el primero en reportar</div>
      </div>
    `;
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  listEl.innerHTML = sorted.map((u, i) => `
    <div class="rank-row">
      <div class="rank-pos">${medals[i] || i + 1}</div>
      <div class="rank-avatar" style="background:${u.bg};color:${u.fg}">${u.init}</div>
      <div class="rank-info">
        <div class="rank-name">${u.name}</div>
        <div class="rank-sub">${u.reports} reportes</div>
      </div>
      <div class="rank-pts-val">${u.pts}</div>
    </div>
  `).join('');
}
